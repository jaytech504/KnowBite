{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
        <title>YourNotes-{{ title }}</title>
    {% else %}
        <title>YourNotes-result</title>
    {% endif %}
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>
        const fileId = "{{ file.id }}";
    </script>
    <script src="{% static 'js/chat.js' %}"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <a href="{% url 'dashboard' %}">
                    Back
                </a>
                <nav class="nav flex-column mt-4">
                    <a class="nav-link active" href="{% url 'summary' file.id %}"><i class="bi bi-file me-2"></i>Summarry</a>
                    <a class="nav-link" href="{% url 'quiz_options' file.id %}"><i class="bi bi-chat me-2"></i>Quiz</a>
                    <a class="nav-link" href="#"><i class="bi bi-chat me-2"></i>Chatbot</a>
                    <a class="nav-link" href="#"><i class="bi bi-text me-2"></i>Transcript</a>
                </nav>
            </div>
                {% block result %}{% endblock %}
        </div>
    </div>
</body>
</html>
