{% extends 'result/base_result.html' %}
{% block result %}
<h2>MCQ Quiz</h2>
<form method="post" action="{% url 'submit_quiz' file.id %}">
    {% csrf_token %}
    {% for mcq in mcqs %}
        <div>
            <p><strong>{{ mcq.question }}</strong></p>
            <label><input type="radio" name="{{ forloop.counter0 }}" value="A"> {{ mcq.option_a }}</label><br>
            <label><input type="radio" name="{{ forloop.counter0 }}" value="B"> {{ mcq.option_b }}</label><br>
            <label><input type="radio" name="{{ forloop.counter0 }}" value="C"> {{ mcq.option_c }}</label><br>
            <label><input type="radio" name="{{ forloop.counter0 }}" value="D"> {{ mcq.option_d }}</label><br>
        </div>
    {% endfor %}
    <button type="submit">Submit Quiz</button>
</form>

{% endblock %}
