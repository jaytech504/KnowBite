{% load static %}
<!-- CUSTOM PROVIDER LOGIN (account) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continue with Google</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-container" id="provider-login-container">
        <div class="logo-container">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-robot" viewBox="0 0 16 16">
                    <path d="M8.5 1.866a1 1 0 1 0-1 0V3h-2A4.5 4.5 0 0 0 1 7.5V8a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1v1a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1v-.5A4.5 4.5 0 0 0 10.5 3h-2zM14 7.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.5A3.5 3.5 0 0 1 5.5 4h5A3.5 3.5 0 0 1 14 7.5"/>
                </svg>
                KnowBite
            </div>
        </div>
        <div class="text-center mb-3">
            <img src="https://www.google.com/favicon.ico" alt="Google logo" width="32" height="32">
        </div>
        <h4 class="mb-3 text-center">Continue with Google</h4>
        <p class="text-muted text-center mb-4">To continue, please confirm your Google account and grant access to KnowBite.</p>
        <form method="post" action="">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary w-100 mb-2">Continue as {{ account.extra_data.email|default:account.uid }}</button>
        </form>
        <div class="text-center mt-2">
            <a href="/accounts/login/" class="text-primary text-decoration-none">Cancel</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
