</head>
<body>

                <nav class="nav flex-column mt-4">
                    <a class="nav-link active" href="{% url 'dashboard' %}"><i class="bi bi-grid me-2"></i>Dashboard</a>
                    <a class="nav-link" href="{% url 'yournotes' %}"><i class="bi bi-file-earmark me-2"></i>Your Notes</a>
                    <a class="nav-link" href="{% url 'settings' %}"><i class="bi bi-gear me-2"></i>Settings</a>

            </div>
                {% block content %}{% endblock %}
        </div>
    </div>
     <!-- Bootstrap JS Bundle -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function triggerFileUpload(type) {
            let fileInput = document.getElementById('file-input');
            document.getElementById('file_type').value = type;

            if(type === 'pdf') {
                fileInput.accept = '.pdf, .txt';
            } else if (type === 'audio') {
                fileInput.accept = '.mp3, .wav, .ogg, .m4a';
            }else if (type === 'video') {
                fileInput.accept = '.mp4, .avi, .mov, .mkv, .flv, .webm';
            }

            fileInput.click();
        }

        function showVideoOptions() {
            let choice = confirm("Click OK to upload from storage or Cancel to paste a YouTube link.");
            if (choice) {
                triggerFileUpload('video');
            } else {
                document.getElementById('youtube-input').style.display = 'block';
            }
        }

        function submitForm() {
            document.getElementById('upload-form').submit();
        }

        function uploadYouTube() {
            let link = document.getElementById('youtube-link').value;
            if (link) {
                let form = document.createElement('form');
                form.method = 'post';
                form.action = "{% url 'upload' %}";
                form.style.display = 'none';

                let csrf = document.createElement('input');
                csrf.type = 'hidden';
                csrf.name = 'csrfmiddlewaretoken';
                csrf.value = "{{ csrf_token }}";

                let input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'youtube_link';
                input.value = link;

                form.appendChild(csrf);
                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
            } else {
                alert("Please enter a valid YouTube link.");
            }
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const darkMode = document.cookie.split('; ').find(row => row.startsWith('dark_mode='));
            if (darkMode && darkMode.split('=')[1] === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('dark-mode-toggle').checked = true;
            }
        })

        document.getElementById('dark-mode-toggle').addEventListener('change', function() {
            fetch("{% url 'toggle_dark_mode' %}", {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            }).then(response => response.json())
              .then(data => {
                if (data.success) {
                    document.body.classList.toggle('dark-mode');
                    location.reload();
                }
              });
        });
    </script>

</body>
</html>
